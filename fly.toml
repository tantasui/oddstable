app = "oddstable"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile.server"

[env]
  PORT = "3001"
  DB_PATH = "/data/oddstable.db"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    timeout = "5s"
    path = "/api/fixtures"
    method = "GET"

[[mounts]]
  source = "oddstable_data"
  destination = "/data"
