# fly.toml app configuration file generated for oddstable on 2026-07-08T06:39:38Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'oddstable'
primary_region = 'ams'

[build]
  dockerfile = 'Dockerfile.server'

[env]
  DB_PATH = '/data/oddstable.db'
  PORT = '3001'

[[mounts]]
  source = 'oddstable_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/api/fixtures'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
